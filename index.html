<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Portfolio | Case Studies</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <div class="cursor"></div>

    <nav>
        <div class="logo">PORTFOLIO<span>'26</span></div>
        <div class="nav-links">
            <a href="#lumora">Lumora</a>
            <a href="#brew">Brew Haven</a>
            <a href="#neon">NeonWave</a>
        </div>
    </nav>

    <section id="lumora" class="case-study" style="background-color: #2F3E34; --accent: #A8B5A2; --text: #F7F3EF;">
        <div class="container">
            <div class="brand-intro" data-aos="fade-up">
                <img src="lumora-logo.png" alt="Lumora Logo" class="brand-logo">
                <h1 style="color: var(--text);">Lumora Skin</h1>
                <p class="tagline" style="color: var(--accent);">Skincare Identity • Minimalist Aesthetics</p>
            </div>

            <div class="content-grid">
                <div class="video-wrap landscape" data-aos="zoom-in" style="border: 1px solid var(--accent);">
                    <video autoplay loop muted playsinline>
                        <source src="lumora-mockup.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="video-wrap portrait" data-aos="fade-left" style="border: 1px solid var(--accent);">
                    <video autoplay loop muted playsinline>
                        <source src="lumora-story.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="insta-feed">
                    <img src="lumora-post1.png" data-aos="fade-up">
                    <img src="lumora-post2.png" data-aos="fade-up" data-aos-delay="100">
                    <img src="lumora-post3.png" data-aos="fade-up" data-aos-delay="200">
                </div>
            </div>
        </div>
    </section>

    <section id="brew" class="case-study" style="background-color: #4B2E2B; --accent: #D9A066; --text: #E6D3B3;">
        <div class="container">
            <div class="brand-intro" data-aos="fade-up">
                <img src="brew-logo.png" alt="Brew Haven Logo" class="brand-logo">
                <h1 style="color: var(--text);">Brew Haven</h1>
                <p class="tagline" style="color: var(--accent);">Artisanal Cafe • Visual Identity</p>
            </div>

            <div class="content-grid">
                <div class="dual-images">
                    <img src="brew-buisnesscard-front.png" alt="Front" data-aos="fade-right">
                    <img src="brew-buisnesscard-back.png" alt="Back" data-aos="fade-left">
                </div>
                <div class="menu-showcase" data-aos="fade-up">
                    <img src="brew-menu.png" alt="Menu" style="border: 5px solid var(--text);">
                </div>
                <div class="mockup-row">
                    <img src="brew-mockup1.png" alt="Cup 1" data-aos="zoom-in">
                    <img src="brew-mockup2.png" alt="Cup 2" data-aos="zoom-in" data-aos-delay="100">
                </div>
                <div class="insta-feed">
                    <img src="brew-post1.png" alt="Post 1">
                    <img src="brew-post2.png" alt="Post 2">
                    <img src="brew-post3.png" alt="Post 3">
                </div>
            </div>
        </div>
    </section>

    <section id="neon" class="case-study" style="background-color: #000000; --accent: #ec5a86; --text: #493993;">
        <div class="container">
            <div class="brand-intro" data-aos="fade-up">
                <h1 style="color: var(--text); -webkit-text-stroke: 1.5px var(--accent); font-size: 5rem;">NEONWAVE</h1>
                <p class="tagline" style="color: var(--accent); letter-spacing: 10px;">EDM FESTIVAL 2026</p>
            </div>
            
            <div class="neon-grid">
                <img src="fest-poster.png" class="poster" data-aos="fade-right" style="border-color: var(--accent);">
                <div class="ticket-stack">
                    <div class="ticket-label" style="color: var(--accent);">General Admission</div>
                    <img src="ticket-normal.png" alt="Ticket" data-aos="fade-up">
                    <div class="ticket-label" style="color: var(--text); margin-top: 20px;">VIP Pass</div>
                    <img src="ticket-vip.png" alt="VIP" data-aos="fade-up" data-aos-delay="200">
                </div>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: false });
        const cursor = document.querySelector('.cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
