            <img src="brew-logo.png" alt="Logo" class="brand-logo">
            <h1 style="color: var(--text);">Brew Haven</h1>
            <p class="tagline">Visual Identity</p>
        </div>

        <div class="content-grid">
            <div class="stack-column">
                <img src="brew-businesscard-front.png" alt="Card Front">

                <img src="brew-menu.png" alt="Menu">

            <div class="insta-feed">
